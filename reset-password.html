<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1726" />
  <meta name="description" content="Live Scores Tennis Plus - redefinição de senha" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <title>Redefinir senha | TennisPro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="brand-wrap auth-brand">
        <div class="app-logo">
          <img src="img/logo.png" alt="Live Scores Tennis +" class="app-logo-img" />
        </div>
        <div>
          <h1>Esqueci minha senha</h1>
          <p class="muted">Informe seu e-mail para receber o link de redefinição</p>
        </div>
      </div>

      <form id="resetPasswordForm" class="form auth-form">
        <label>E-mail
          <input type="email" id="email" required />
        </label>

        <button type="submit" class="btn primary">Enviar link de redefinição</button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Voltar para o login</a>
        </div>
      </form>

      <div id="resetPasswordMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/reset-password.js"></script>

  <script> if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js") .then((registration) => { console.log("Service Worker registrado:", registration); }) .catch((error) => { console.error("Erro ao registrar Service Worker:", error); }); }); } </script>
</body>
</html>
