<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redefinir senha | Live Scores Tennis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="brand-wrap auth-brand">
        <div class="app-logo">
          <img src="img/logo.png" alt="Live Scores Tennis +" class="app-logo-img" />
        </div>
        <div>
          <h1>Esqueci minha senha</h1>
          <p class="muted">Informe seu e-mail para receber o link de redefinição</p>
        </div>
      </div>

      <form id="resetPasswordForm" class="form auth-form">
        <label>E-mail
          <input type="email" id="email" required />
        </label>

        <button type="submit" class="btn primary">Enviar link de redefinição</button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Voltar para o login</a>
        </div>
      </form>

      <div id="resetPasswordMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
