<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Live Scores Tennis +</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <main class="container stack">

    <section class="panel panel-glass admin-panel">

      <header class="topbar topbar-glass admin-topbar-inside">
        <div class="brand-wrap">
          <div class="brand-icon">🎾</div>
          <div>
            <h1>Painel Administrativo</h1>
            <p>Cadastro e manutenção das partidas</p>
          </div>
        </div>

        <nav class="topnav">
          <a href="index.html" class="btn link">Visualização</a>
          <button id="logoutBtn" class="btn link">Sair</button>
        </nav>
      </header>

      <div class="section-head">
        <div>
          <span class="section-kicker">Gerenciamento</span>
          <h2 id="formTitle">Nova partida</h2>
          <p class="muted">Cadastre e gerencie os jogos ao vivo</p>
        </div>

        <div class="actions">
          <button id="newMatchBtn" class="btn">Nova partida</button>
        </div>
      </div>

      <form id="matchForm" class="form grid-form">
        <input type="hidden" id="docId" />

        <label>Nome da categoria
          <input type="text" id="categoryName" required />
        </label>

        <label>Formato da partida
          <select id="matchFormat" required>
            <option value="">Selecione...</option>
            <option value="3 sets com vantagem">3 sets com vantagem</option>
            <option value="3 sets sem vantagem">3 sets sem vantagem</option>
            <option value="2 sets com vantagem + o 3º set um supertiebreak de 10 pontos">2 sets com vantagem + o 3º set um supertiebreak de 10 pontos</option>
            <option value="2 sets sem vantagem + o 3º set um supertiebreak de 10 pontos">2 sets sem vantagem + o 3º set um supertiebreak de 10 pontos</option>
            <option value="1 set com vantagem com supertiebreak de 10 pontos">1 set com vantagem com supertiebreak de 10 pontos</option>
            <option value="1 set sem vantagem com um supertiebreak de 10 pontos">1 set sem vantagem com um supertiebreak de 10 pontos</option>
            <option value="1 set com vantagem com um tiebreak de 7 pontos">1 set com vantagem com um tiebreak de 7 pontos</option>
            <option value="1 set sem vantagem com um tiebreak de 7 pontos">1 set sem vantagem com um tiebreak de 7 pontos</option>
            <option value="1 set pro de 8 games com vantagem com um tiebreak de 7 pontos">1 set pro de 8 games com vantagem com um tiebreak de 7 pontos</option>
            <option value="1 set pro de 8 games sem vantagem com um tiebreak de 7 pontos">1 set pro de 8 games sem vantagem com um tiebreak de 7 pontos</option>
            <option value="1 set pro de 8 games sem vantagem com um supertiebreak de 10 pontos">1 set pro de 8 games sem vantagem com um supertiebreak de 10 pontos</option>
            <option value="2 sets de 4 games sem vantagem com um supertiebreak de 10 pontos">2 sets de 4 games sem vantagem com um supertiebreak de 10 pontos</option>
            <option value="2 sets de 4 games com vantagem com um supertiebreak de 10 pontos">2 sets de 4 games com vantagem com um supertiebreak de 10 pontos</option>
          </select>
        </label>

        <label>Data e hora da partida
          <input type="datetime-local" id="matchDateTime" required />
        </label>

        <label>Quadra
          <input type="text" id="court" required />
        </label>

        <label>Fase do torneio
          <select id="tournamentStage" required>
            <option value="">Selecione...</option>
            <option value="Primeira Rodada">Primeira Rodada</option>
            <option value="Segunda Rodada">Segunda Rodada</option>
            <option value="Terceira Rodada">Terceira Rodada</option>
            <option value="Oitavas de Final">Oitavas de Final</option>
            <option value="Quartas de Final">Quartas de Final</option>
            <option value="Semifinais">Semifinais</option>
            <option value="Final">Final</option>
          </select>
        </label>

        <label>Status inicial
          <select id="status">
            <option value="scheduled">Jogos do dia</option>
            <option value="live">Em andamento</option>
            <option value="finished">Finalizada</option>
            <option value="wo">Finalizada por WO</option>
          </select>
        </label>

        <label>Nome do jogador 1
          <input type="text" id="player1" required />
        </label>

        <label>Nome do jogador 2
          <input type="text" id="player2" required />
        </label>

        <label>WO (vencedor por WO)
          <select id="winnerByWO">
            <option value="">Nenhum</option>
            <option value="player1">Jogador 1</option>
            <option value="player2">Jogador 2</option>
          </select>
        </label>

        <div class="actions full">
          <button type="submit" class="btn primary">Salvar</button>
          <button type="button" id="clearBtn" class="btn">Limpar</button>
        </div>
      </form>

      <div id="adminMsg" class="msg"></div>
    </section>

    <section class="panel panel-glass">
      <div class="section-head">
        <div>
          <span class="section-kicker">Lista de partidas</span>
          <h2>Partidas cadastradas</h2>
          <p class="muted">Filtre, pagine e gerencie as partidas</p>
        </div>
      </div>

      <div class="filters-bar">
        <input type="text" id="filterPlayers" placeholder="Pesquisar por jogador" />
        <input type="text" id="filterCategory" placeholder="Pesquisar por categoria" />
        <select id="filterStatus">
          <option value="">Todos os status</option>
          <option value="scheduled">Jogos do dia</option>
          <option value="live">Em andamento</option>
          <option value="finished">Finalizada</option>
          <option value="wo">WO</option>
        </select>
      </div>

      <div class="table-wrap desktop-table">
        <table class="admin-table">
          <thead>
            <tr>
              <th class="col-players">Jogadores</th>
              <th class="col-category">Categoria</th>
              <th class="col-status">Status</th>
              <th class="col-actions">Opções</th>
            </tr>
          </thead>
          <tbody id="matchesTable"></tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <button id="prevPageBtn" class="btn">Anterior</button>
        <div class="pagination-info">
          Página <strong id="pageInfo">1</strong> de <strong id="totalPages">1</strong>
        </div>
        <button id="nextPageBtn" class="btn">Próxima</button>
      </div>
    </section>

  </main>

  <dialog id="detailsDialog" class="dialog">
    <div class="dialog-head">
      <h3>Detalhes da partida</h3>
      <button id="closeDialogBtn" class="btn">Fechar</button>
    </div>
    <div id="detailsContent" class="details"></div>
  </dialog>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
