<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transmissão Placar TV | TennisPro</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #liveVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
    .tv-overlay-container { position: absolute; bottom: 24px; left: 24px; z-index: 2; width: auto; height: auto; box-sizing: border-box; }
    .placar-tv-box { background: transparent; min-width: 320px; }
    .status-badge-tv { text-align: right; color: #d8ff63; font-size: 11px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; padding-right: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .tabela-tv-placar { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
    .tabela-tv-placar th { color: #a9c6e6; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 10px 2px 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .th-jogador { text-align: left; } .th-set { text-align: center; width: 50px; } .th-pontos { text-align: center; width: 65px; }
    .linha-jogador-tv td { background: rgba(30, 41, 59, 0.88); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 44px; vertical-align: middle; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .linha-jogador-tv td:first-child { border-left: 1px solid rgba(30, 41, 59, 0.88); border-top-left-radius: 10px; border-bottom-left-radius: 10px; padding-left: 14px; }
    .linha-jogador-tv td:last-child { border-right: 1px solid rgba(30, 41, 59, 0.88); border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
    .nome-tv-atleta { color: #ffffff; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .serve-ball-tv { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d8ff63; box-shadow: 0 0 8px #d8ff63, 0 0 2px #d8ff63; flex-shrink: 0; }
    .set-tv-score { text-align: center; color: #d8ff63; font-size: 18px; font-weight: 800; }
    .pontos-tv-score { text-align: center; color: #ffffff; font-size: 18px; font-weight: 800; background: rgba(255, 255, 255, 0.04); border-left: 1px solid rgba(255, 255, 255, 0.05); }
  </style>
</head>
<body>

  <!-- Câmera de fundo -->
  <video id="liveVideo" autoplay playsinline muted></video>

  <!-- Placar Horizontal -->
  <main class="tv-overlay-container">
    <div class="placar-tv-box">
      <div class="status-badge-tv" id="tvStatus">SINCED</div>
      <div id="tvGridPlacar"></div>
    </div>
  </main>

  <script>
    // 1. INICIALIZAÇÃO DA CÂMERA DO SMARTPHONE
    async function ligarCameraTraseira() {
      try {
        const constraints = {
          video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('liveVideo');
        if (video) video.srcObject = stream;
      } catch (error) {
        console.warn("Câmera indisponível.", error);
      }
    }
    document.addEventListener('DOMContentLoaded', ligarCameraTraseira);

    // 2. CRIA O RÁDIO RECEPTOR DINÂMICO
    const canalTv = new BroadcastChannel("tennis_tv_channel");

    function processarDadosPlacar(data) {
      if (!data || !data.score) return;
      
      const score = data.score || {};
      const history = Array.isArray(score.setHistory) ? score.setHistory : [];

      // A) IDENTIFICA O FORMATO DO JOGO PELO TEXTO DA PARTIDA
      const fmt = String(data.matchFormat || "").toLowerCase();
      const hasTwoSets = fmt.includes("2 sets");
      const hasThreeSets = fmt.includes("3 sets");
      
      let qtdCols = 1;
      if (hasTwoSets || hasThreeSets) qtdCols = 2;
      if (hasThreeSets) qtdCols = 3;

      // B) PROCESSAMENTO DE NOMES (SIMPLES OU DUPLAS)
      const isDuplas = String(data.gameFormat || "").includes("Duplas");
      let name1 = String(data.player1 || "Jogador 1");
      let name2 = String(data.player2 || "Jogador 2");
      if (isDuplas) {
        name1 = `${data.player1 || "Jogador 1"}/${data.player2 || "Jogador 2"}`;
        name2 = `${data.player3 || "Jogador 3"}/${data.player4 || "Jogador 4"}`;
      }

      // C) RESOLVE A PONTUAÇÃO CONVERSÍVEL (00, 15, 30, 40, AD, TIE-BREAK)
      const isTieBreakAtivo = score.tieBreakMode === "tb7" || score.tieBreakMode === "super10";
      let viewPts1 = "00";
      let viewPts2 = "00";

      if (isTieBreakAtivo) {
        viewPts1 = String(score.tieBreakPoints1 ?? 0);
        viewPts2 = String(score.tieBreakPoints2 ?? 0);
        document.getElementById("tvStatus").innerText = score.tieBreakMode === "super10" ? "SUPER TIE-BREAK" : "TIE-BREAK";
      } else {
        if (data.status === "live") document.getElementById("tvStatus").innerText = "EM ANDAMENTO";
        else if (data.status === "suspended") document.getElementById("tvStatus").innerText = "SUSPENSA";
        else if (data.status === "finished") document.getElementById("tvStatus").innerText = "FINALIZADA";
        else document.getElementById("tvStatus").innerText = "NÃO INICIADA";

        const deparaTenis = { "0": "00", "1": "15", "2": "30", "3": "40" };
        if (score.advantage === "player1") {
          viewPts1 = "AD"; viewPts2 = "40";
        } else if (score.advantage === "player2") {
          viewPts1 = "40"; viewPts2 = "AD";
        } else {
          viewPts1 = deparaTenis[String(score.points1 ?? 0)] || "00";
          viewPts2 = deparaTenis[String(score.points2 ?? 0)] || "00";
        }
      }

      // D) MAPEIA OS VALORES DE CADA CARD DE SET COM HISTÓRICO DINÂMICO
      const setsHtmlHead = [];
      const setsHtmlRow1 = [];
      const setsHtmlRow2 = [];

      for (let i = 0; i < qtdCols; i++) {
        setsHtmlHead.push(`<th class="th-set">${i + 1}º SET</th>`);
        
        let g1 = "0";
        let g2 = "0";

        if (history[i]) {
          g1 = String(history[i].games1 ?? 0);
          g2 = String(history[i].games2 ?? 0);
          if (history[i].tieBreakMode && (history[i].tieBreakPoints1 > 0 || history[i].tieBreakPoints2 > 0)) {
            const tb1 = history[i].tieBreakPoints1 || 0;
            const tb2 = history[i].tieBreakPoints2 || 0;
            if (tb1 > tb2) g1 += `<sub>${tb1}</sub>`;
            else g2 += `<sub>${tb2}</sub>`;
          }
        } else if (history.length === i) {
          g1 = String(score.games1 ?? 0);
          g2 = String(score.games2 ?? 0);
        } else {
          g1 = "--";
          g2 = "--";
        }

        setsHtmlRow1.push(`<td class="set-tv-score">${g1}</td>`);
        setsHtmlRow2.push(`<td class="set-tv-score">${g2}</td>`);
      }

      // E) RECONSTRÓI A TABELA INTEIRA COM AS COLUNAS SOLICITADAS
      const server = score.server || data.server || "player1";
      const ball1 = server === "player1" ? '<span class="serve-ball-tv"></span>' : '';
      const ball2 = server === "player2" ? '<span class="serve-ball-tv"></span>' : '';

      const markupCompleto = `
        <table class="tabela-tv-placar">
          <thead>
            <tr>
              <th class="th-jogador">Jogador</th>
              ${setsHtmlHead.join("")}
              <th class="th-pontos">Pontos</th>
            </tr>
          </thead>
          <tbody>
            <tr class="linha-jogador-tv">
              <td>
                <div class="nome-tv-atleta">
                  ${ball1}
                  <span>${name1.toUpperCase()}</span>
                </div>
              </td>
              ${setsHtmlRow1.join("")}
              <td class="pontos-tv-score">${viewPts1}</td>
            </tr>
            <tr class="linha-jogador-tv">
              <td>
                <div class="nome-tv-atleta">
                  ${ball2}
                  <span>${name2.toUpperCase()}</span>
                </div>
              </td>
              ${setsHtmlRow2.join("")}
              <td class="pontos-tv-score">${viewPts2}</td>
            </tr>
          </tbody>
        </table>
      `;

      document.getElementById("tvGridPlacar").innerHTML = markupCompleto;
    }

    // REMOVIDO FILTRO DE ID CEGO: Escuta e renderiza diretamente o sinal enviado pelo painel ativo
    canalTv.onmessage = (event) => {
      const payload = event.data;
      if (payload && payload.score) {
        processarDadosPlacar(payload);
      }
    };

    // Solicita os dados iniciais ao abrir a janela
    setTimeout(() => { 
      canalTv.postMessage("PEDIR_PLACAR_ATUAL"); 
    }, 300);
  </script>
</body>
</html>
