  <style> html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; background: #0f1726; color: #fff; font-family: Arial, sans-serif; } body.aovivo-page { overflow-x: hidden; } .live-page { min-height: 100vh; display: flex; flex-direction: column; gap: 12px; padding: 12px; box-sizing: border-box; } .topbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; padding: 12px; border-radius: 14px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); box-sizing: border-box; } .status { font-weight: 900; font-size: 15px; margin-bottom: 4px; } .info { font-size: 12px; opacity: 0.85; } .actions { display: flex; gap: 10px; flex-wrap: wrap; } .btn { border: none; border-radius: 12px; padding: 11px 14px; font-weight: 800; cursor: pointer; color: #fff; transition: 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; } .btn:hover { transform: translateY(-1px); filter: brightness(1.05); } .btn.green { background: linear-gradient(135deg, #16a34a, #15803d); } .btn.gray { background: linear-gradient(135deg, #6b7280, #4b5563); } .video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); box-sizing: border-box; } #liveVideo { width: 100%; height: 100%; object-fit: cover; background: #000; display: block; } .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; background: rgba(0, 0, 0, 0.25); color: #fff; font-weight: 900; text-align: center; padding: 16px; z-index: 5; box-sizing: border-box; } /* ============================================================ PLACAR COMPACTO DA TRANSMISSÃO ============================================================ */ .live-public-scoreboard { position: absolute !important; left: 10px !important; bottom: 10px !important; z-index: 30 !important; width: fit-content !important; max-width: calc(100% - 20px) !important; pointer-events: none !important; } .live-scoreboard-shell { width: fit-content !important; color: #fff; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9); } .live-scoreboard-status { display: none !important; } .live-scoreboard-content { width: fit-content !important; } #tvGridPlacar { width: fit-content !important; max-width: 100% !important; } .aovivo-compact-scoreboard { display: flex !important; flex-direction: column !important; gap: 1px !important; width: fit-content !important; max-width: calc(100vw - 20px) !important; padding: 4px 5px !important; border-radius: 5px !important; background: rgba(0, 0, 0, 0.72) !important; color: #fff !important; backdrop-filter: blur(6px) !important; -webkit-backdrop-filter: blur(6px) !important; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3) !important; box-sizing: border-box !important; } .aovivo-compact-row { display: grid !important; align-items: center !important; width: fit-content !important; min-width: 0 !important; min-height: 18px !important; gap: 0 !important; line-height: 1 !important; } .aovivo-compact-name { display: flex !important; align-items: center !important; min-width: 0 !important; width: 100% !important; overflow: hidden !important; white-space: nowrap !important; } .aovivo-compact-serve { display: inline-block !important; width: 6px !important; height: 6px !important; min-width: 6px !important; margin-right: 3px !important; border-radius: 50% !important; background: #d8ff63 !important; box-shadow: 0 0 5px rgba(216, 255, 99, 0.9) !important; flex: 0 0 6px !important; } .aovivo-compact-serve.hidden { visibility: hidden !important; } .aovivo-compact-player { display: block !important; min-width: 0 !important; width: 100% !important; overflow: hidden !important; text-overflow: ellipsis !important; white-space: nowrap !important; font-size: 9px !important; line-height: 1 !important; font-weight: 800 !important; } .aovivo-compact-number { display: flex !important; align-items: center !important; justify-content: center !important; min-width: 18px !important; height: 17px !important; text-align: center !important; font-size: 10px !important; line-height: 1 !important; font-weight: 900 !important; color: #fff !important; } .aovivo-compact-number.current { color: #d8ff63 !important; } .aovivo-compact-number.empty { visibility: hidden !important; } .aovivo-compact-score-set { display: inline-flex !important; align-items: flex-start !important; justify-content: center !important; white-space: nowrap !important; } .aovivo-compact-score-main { line-height: 1 !important; } .aovivo-compact-score-tb { position: relative !important; top: -0.42em !important; margin-left: 1px !important; font-size: 0.58em !important; line-height: 1 !important; } /* ============================================================ MENSAGEM DE ENCERRAMENTO ============================================================ */ .live-scoreboard-ending { position: absolute; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; text-align: center; background: rgba(0, 0, 0, 0.72); color: #fff; font-size: clamp(20px, 5vw, 42px); font-weight: 900; letter-spacing: 0.03em; box-sizing: border-box; } /* ============================================================ DEBUG ============================================================ */ #cameraStatus, #cameraDebug { display: none !important; } /* ============================================================ RESPONSIVO ============================================================ */ @media (max-width: 768px) { .live-page { padding: 8px; } .topbar { align-items: flex-start; } .actions { width: 100%; } .btn { flex: 1 1 100%; width: 100%; } .live-public-scoreboard { left: 7px !important; bottom: 7px !important; max-width: calc(100% - 14px) !important; } .aovivo-compact-scoreboard { max-width: calc(100vw - 14px) !important; padding: 3px 4px !important; } .aovivo-compact-row { min-height: 16px !important; } .aovivo-compact-player { font-size: 10px !important; } .aovivo-compact-number { min-width: 15px !important; height: 15px !important; font-size: 9px !important; } .aovivo-compact-serve { width: 5px !important; height: 5px !important; min-width: 5px !important; flex-basis: 5px !important; margin-right: 3px !important; } } @media (max-width: 480px) { .aovivo-compact-player { font-size: 7px !important; } .aovivo-compact-number { min-width: 14px !important; font-size: 8px !important; } } /* ============================================================ TELA CHEIA ============================================================ */ #videoWrap:fullscreen { width: 100vw; height: 100vh; aspect-ratio: auto; border: 0; border-radius: 0; background: #000; } #videoWrap:fullscreen #liveVideo { width: 100vw; height: 100vh; object-fit: contain; } #videoWrap:fullscreen .live-public-scoreboard { left: 3vw !important; bottom: 3vh !important; width: fit-content !important; } #videoWrap:fullscreen .aovivo-compact-scoreboard { width: fit-content !important; max-width: calc(100vw - 30px) !important; padding: 6px 8px !important; } #videoWrap:fullscreen .aovivo-compact-player { font-size: 12px !important; } #videoWrap:fullscreen .aovivo-compact-number { font-size: 14px !important; } /* ============================================================ CORREÇÃO DEFINITIVA DO ALINHAMENTO DAS COLUNAS ============================================================ */

.aovivo-compact-scoreboard {
  width: fit-content !important;
  max-width: calc(100vw - 20px) !important;
}

.aovivo-compact-row {
  width: 100% !important;
  min-width: 0 !important;
  gap: 0 !important;
  align-items: center !important;
}

/* Partida em andamento com 1 set visível e pontos */
.aovivo-compact-scoreboard.live.sets-1
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px
    25px !important;
}

/* Partida em andamento com 2 sets visíveis e pontos */
.aovivo-compact-scoreboard.live.sets-2
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px
    20px
    25px !important;
}

/* Partida em andamento com 3 sets visíveis e pontos */
.aovivo-compact-scoreboard.live.sets-3
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px
    20px
    20px
    25px !important;
}

/* Partida finalizada com 1 set */
.aovivo-compact-scoreboard.finished.sets-1
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px !important;
}

/* Partida finalizada com 2 sets */
.aovivo-compact-scoreboard.finished.sets-2
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px
    20px !important;
}

/* Partida finalizada com 3 sets */
.aovivo-compact-scoreboard.finished.sets-3
.aovivo-compact-row {
  grid-template-columns:
    minmax(0, 145px)
    20px
    20px
    20px !important;
}

/* Ajustes mobile */
@media (max-width: 768px) {
  .aovivo-compact-scoreboard.live.sets-1
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px
      22px !important;
  }

  .aovivo-compact-scoreboard.live.sets-2
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px
      18px
      22px !important;
  }

  .aovivo-compact-scoreboard.live.sets-3
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px
      18px
      18px
      22px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-1
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-2
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px
      18px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-3
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 120px)
      18px
      18px
      18px !important;
  }
}

@media (max-width: 480px) {
  .aovivo-compact-scoreboard.live.sets-1
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 105px)
      17px
      21px !important;
  }

  .aovivo-compact-scoreboard.live.sets-2
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 105px)
      17px
      17px
      21px !important;
  }

  .aovivo-compact-scoreboard.live.sets-3
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 105px)
      17px
      17px
      17px
      21px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-1
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 105px)
      17px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-2
  .aovivo-compact-row {
    grid-template-columns:
      minmax(0, 105px)
      17px
      17px !important;
  }

  .aovivo-compact-scoreboard.finished.sets-3

    grid-template-columns:
      minmax(0, 105px)
      17px
      17px
      17px !important;
  }
} </style>
</head>

<body class="aovivo-page">
  <main class="live-page">

    <section class="topbar">
      <div>
        <div class="status" id="tvStatus">
          Carregando...
        </div>

        <div class="info" id="tvInfoBox">
          Inicializando transmissão
        </div>
      </div>

      <div class="actions">
        <button class="btn green" id="btnAbrirCamera" type="button" >
          <ion-icon name="videocam-outline"></ion-icon>
          <span>Iniciar transmissão</span>
        </button>

        <button class="btn gray" id="btnExpandirTela" type="button" >
          <ion-icon name="expand-outline"></ion-icon>
          <span>Expandir Tela</span>
        </button>

        <button class="btn gray" id="btnTentarNovamente" type="button" style="display: none;" >
          <ion-icon name="refresh-outline"></ion-icon>
          <span>Tentar novamente</span>
        </button>
      </div>
    </section>

    <section class="video-wrap" id="videoWrap" aria-label="Transmissão ao vivo" >
      <video id="liveVideo" autoplay muted playsinline webkit-playsinline ></video>

      <div class="overlay" id="telaInicial" >
        Aguardando vídeo...
      </div>

      <!-- Único placar da transmissão -->
      <div class="live-public-scoreboard" id="livePublicScoreboard" aria-live="polite" >
        <div class="live-scoreboard-shell" id="liveScoreboardShell" >
          <div class="live-scoreboard-status" id="liveScoreboardStatus" ></div>

          <div class="live-scoreboard-content" id="tvGridPlacar" ></div>
        </div>
      </div>

      <div class="live-scoreboard-ending" id="liveEndingMessage" >
        Encerrando Transmissão
      </div>
    </section>

    <section class="debug" id="cameraStatus" ></section>

    <section class="debug" id="cameraDebug" ></section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>

  <script src="js/tennisRules.js"></script>

  <script src="js/aovivo.js?v=20260717-06"></script>

  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js" ></script>

  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js" ></script>
</body>
</html>
