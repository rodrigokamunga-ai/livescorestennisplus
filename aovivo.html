<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1726" />
  <title>Ao Vivo - TennisPro</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/public.css" />

  <style> body { margin: 0; background: #0f1726; color: #fff; font-family: Arial, sans-serif; } .live-page { min-height: 100vh; display: flex; flex-direction: column; gap: 12px; padding: 12px; box-sizing: border-box; } .topbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); } .topbar .status { font-weight: 900; font-size: 15px; } .topbar .info { font-size: 12px; opacity: .85; } .actions { display: flex; gap: 10px; flex-wrap: wrap; } .btn { border: none; border-radius: 12px; padding: 11px 14px; font-weight: 800; cursor: pointer; color: #fff; background: #2563eb; } .btn.red { background: #dc2626; } .btn.green { background: #16a34a; } .btn.gray { background: #6b7280; } .video-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); } video { width: 100%; height: 100%; object-fit: cover; background: #000; } .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; background: rgba(0,0,0,0.25); color: #fff; font-weight: 900; text-align: center; padding: 16px; } .score-box { padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); } .score-title { font-size: 14px; font-weight: 900; margin-bottom: 8px; opacity: .9; } .score-text { font-size: 28px; font-weight: 900; letter-spacing: .02em; } .debug { font-size: 12px; line-height: 1.35; opacity: .85; white-space: pre-wrap; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); min-height: 80px; } </style>
</head>

<body>
  <main class="live-page">
    <section class="topbar">
      <div>
        <div class="status" id="tvStatus">Carregando...</div>
        <div class="info" id="tvInfoBox">Inicializando</div>
      </div>

      <div class="actions">
        <button class="btn green" id="btnAbrirCamera">Iniciar transmissão</button>
        <button class="btn gray" id="btnTentarNovamente" style="display:none;">Tentar novamente</button>
      </div>
    </section>

    <section class="video-wrap">
      <video id="liveVideo" autoplay muted playsinline></video>
      <div class="overlay" id="telaInicial">Aguardando vídeo...</div>
    </section>

    <section class="score-box">
      <div class="score-title">Placar ao vivo</div>
      <div id="tvGridPlacar" class="score-text">0x0</div>
    </section>

    <section class="debug" id="cameraStatus"></section>
    <section class="debug" id="cameraDebug"></section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/aovivo.js"></script>

  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
