<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape" />
  <title>Transmissão Placar TV | TennisPro</title>
  
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overscroll-behavior: none; 
    }

    /* Tela de Inicialização obrigatória para liberar a câmera traseira por toque no celular */
    #telaInicial {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0f172a; z-index: 99; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 20px;
    }
    .btn-iniciar-tv {
      background: #d8ff63; color: #0f172a; border: none; padding: 16px 32px;
      font-size: 16px; font-weight: 900; border-radius: 50px; cursor: pointer;
      box-shadow: 0 10px 25px rgba(216,255,99,0.3); text-transform: uppercase;
    }

    /* Vídeo em tela cheia deitado */
    #liveVideo {
      width: 100vw; height: 100vh; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; background: #000;
    }

    /* Placar compacto fixado no Canto Inferior Esquerdo */
    .tv-overlay-container {
      position: absolute; bottom: 5vh; left: 4vw; z-index: 2; width: auto; height: auto; box-sizing: border-box;
    }

    .placar-tv-box { background: transparent; width: 360px; max-width: 85vw; }

    .status-badge-tv {
      text-align: right; color: #d8ff63; font-size: 11px; font-weight: 900; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px; padding-right: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    }

    .tabela-tv-placar { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
    .tabela-tv-placar th { color: #a9c6e6; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 10px 2px 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
    .th-jogador { text-align: left; } .th-set { text-align: center; width: 50px; } .th-pontos { text-align: center; width: 65px; }

    .linha-jogador-tv td {
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      height: 42px; vertical-align: middle; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .linha-jogador-tv td:first-child { border-left: 1px solid rgba(15, 23, 42, 0.85); border-top-left-radius: 8px; border-bottom-left-radius: 8px; padding-left: 12px; }
    .linha-jogador-tv td:last-child { border-right: 1px solid rgba(15, 23, 42, 0.85); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

    .nome-tv-atleta { color: #ffffff; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .serve-ball-tv { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d8ff63; box-shadow: 0 0 8px #d8ff63; flex-shrink: 0; }
    .set-tv-score { text-align: center; color: #d8ff63; font-size: 16px; font-weight: 800; }
    .pontos-tv-score { text-align: center; color: #ffffff; font-size: 16px; font-weight: 800; background: rgba(255, 255, 255, 0.05); border-left: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body>

  <!-- Tela Interativa Inicial (Livre e destravada instantaneamente) -->
  <div id="telaInicial">
    <button class="btn-iniciar-tv" onclick="iniciarFluxoTransmissaoNativa()">Iniciar Transmissão</button>
  </div>

  <!-- Hardware de Vídeo -->
  <video id="liveVideo" autoplay playsinline muted loop></video>

  <main class="tv-overlay-container">
    <div class="placar-tv-box">
      <div class="status-badge-tv" id="tvStatus">AGUARDANDO SINAL...</div>
      <div id="tvGridPlacar"></div>
    </div>
  </main>
  <script>
    // CRIA O RECEPTOR DE RÁDIO LOCAL COMUNICADOR ENTRE ABAS
    const canalTv = new BroadcastChannel("tennis_tv_channel");
    let relogioBuscaDadosTv = null;

    // 1. DISPARADOR DE TOQUE: LIGA A CÂMERA E ATIVA A BUSCA CONTÍNUA
    async function iniciarFluxoTransmissaoNativa() {
      document.getElementById("telaInicial").style.display = "none";
      
      // Ativa o hardware da câmera traseira deitado de forma limpa
      try {
        const constraints = { video: { facingMode: "environment" }, audio: false };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('liveVideo');
        if (video) {
          video.srcObject = stream;
          video.play().catch(e => console.log("Erro autoplay:", e));
        }
      } catch (error) {
        console.warn("Camera indisponivel:", error);
        document.getElementById("tvStatus").innerText = "CÂMERA INDISPONÍVEL";
      }

      // CHAVE DA SINCRONIA: Fica chamando o painel de controle a cada 1 segundo 
      // até que ele acorde e envie os nomes e pontos da partida criada
      relogioBuscaDadosTv = setInterval(() => {
        canalTv.postMessage("PEDIR_PLACAR_ATUAL");
      }, 1000);
    }

    // 2. ESCUTA ATIVA DO RÁDIO LOCAL (IGNORA CONFLITOS DE CACHE E DISCO)
    canalTv.onmessage = (event) => {
      const payload = event.data;
      if (payload && payload.score) {
        // Se recebeu o placar real com sucesso, desliga o relógio de busca para economizar bateria
        if (relogioBuscaDadosTv) {
          clearInterval(relogioBuscaDadosTv);
          relogioBuscaDadosTv = null;
        }
        renderizarPlacarHorizontalTv(payload);
      }
    };

    // 3. RENDERIZADOR COMPACTO HORIZONTAL ESTILO TV DE ESPORTES
    function renderizarPlacarHorizontalTv(data) {
      if (!data || !data.score) return;
      
      const score = data.score || {};
      const history = Array.isArray(score.setHistory) ? score.setHistory : [];

      // Identifica o formato de sets configurado para desenhar as colunas certas
      const fmt = String(data.matchFormat || "").toLowerCase();
      const hasTwoSets = fmt.includes("2 sets");
      const hasThreeSets = fmt.includes("3 sets");
      
      let qtdCols = 1;
      if (hasTwoSets || hasThreeSets) qtdCols = 2;
      if (hasThreeSets) qtdCols = 3;

      // Tratamento dinâmico de nomes para Simples ou Duplas
      const isDuplas = String(data.gameFormat || "").includes("Duplas");
      let name1 = String(data.player1 || "Jogador 1");
      let name2 = String(data.player2 || "Jogador 2");
      if (isDuplas) {
        name1 = `${data.player1 || "Jogador 1"}/${data.player2 || "Jogador 2"}`;
        name2 = `${data.player3 || "Jogador 3"}/${data.player4 || "Jogador 4"}`;
      }

      // Pontuação adaptável do tênis (00, 15, 30, 40, AD, Tie-break)
      const isTieBreakAtivo = score.tieBreakMode === "tb7" || score.tieBreakMode === "super10";
      let viewPts1 = "00";
      let viewPts2 = "00";

      if (isTieBreakAtivo) {
        viewPts1 = String(score.tieBreakPoints1 ?? 0);
        viewPts2 = String(score.tieBreakPoints2 ?? 0);
        document.getElementById("tvStatus").innerText = score.tieBreakMode === "super10" ? "SUPER TIE-BREAK" : "TIE-BREAK";
      } else {
        if (data.status === "live") document.getElementById("tvStatus").innerText = "EM ANDAMENTO";
        else if (data.status === "suspended") document.getElementById("tvStatus").innerText = "SUSPENSA";
        else if (data.status === "finished") document.getElementById("tvStatus").innerText = "FINALIZADA";
        else document.getElementById("tvStatus").innerText = "NÃO INICIADA";

        const deparaTenis = { "0": "00", "1": "15", "2": "30", "3": "40" };
        if (score.advantage === "player1") {
          viewPts1 = "AD"; viewPts2 = "40";
        } else if (score.advantage === "player2") {
          viewPts1 = "40"; viewPts2 = "AD";
        } else {
          viewPts1 = deparaTenis[String(score.points1 ?? 0)] || "00";
          viewPts2 = deparaTenis[String(score.points2 ?? 0)] || "00";
        }
      }

      const setsHtmlHead = [];
      const setsHtmlRow1 = [];
      const setsHtmlRow2 = [];

      for (let i = 0; i < qtdCols; i++) {
        setsHtmlHead.push(`<th class="th-set">${i + 1}º SET</th>`);
        let g1 = history[i] ? String(history[i].games1 ?? 0) : (history.length === i ? String(score.games1 ?? 0) : "--");
        let g2 = history[i] ? String(history[i].games2 ?? 0) : (history.length === i ? String(score.games2 ?? 0) : "--");
        setsHtmlRow1.push(`<td class="set-tv-score">${g1}</td>`);
        setsHtmlRow2.push(`<td class="set-tv-score">${g2}</td>`);
      }

      const server = score.server || data.server || "player1";
      const ball1 = server === "player1" ? '<span class="serve-ball-tv"></span>' : '';
      const ball2 = server === "player2" ? '<span class="serve-ball-tv"></span>' : '';

      document.getElementById("tvGridPlacar").innerHTML = `
        <table class="tabela-tv-placar">
          <thead>
            <tr>
              <th class="th-jogador">Jogador</th>
              ${setsHtmlHead.join("")}
              <th class="th-pontos">Pontos</th>
            </tr>
          </thead>
          <tbody>
            <tr class="linha-jogador-tv">
              <td><div class="nome-tv-atleta">${ball1}<span>${name1.toUpperCase()}</span></div></td>
              ${setsHtmlRow1.join("")}
              <td class="pontos-tv-score">${viewPts1}</td>
            </tr>
            <tr class="linha-jogador-tv">
              <td><div class="nome-tv-atleta">${ball2}<span>${name2.toUpperCase()}</span></div></td>
              ${setsHtmlRow2.join("")}
              <td class="pontos-tv-score">${viewPts2}</td>
            </tr>
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
