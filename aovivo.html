<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape" />
  <title>Transmissão Placar TV | TennisPro</title>

  <style> html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; } body { position: relative; } #telaInicial { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #0f172a; z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 14px; padding: 24px; box-sizing: border-box; text-align: center; } .btn-iniciar-tv { background: #d8ff63; color: #0f172a; border: none; padding: 16px 32px; font-size: 16px; font-weight: 900; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 25px rgba(216,255,99,0.3); text-transform: uppercase; letter-spacing: 0.03em; } .camera-status { color: #fff; font-size: 14px; font-weight: 700; opacity: 0.9; max-width: 90vw; line-height: 1.35; } #liveVideo { width: 100vw; height: 100vh; object-fit: cover; position: absolute; inset: 0; z-index: 1; background: #000; } .tv-overlay-container { position: absolute; bottom: 5vh; left: 4vw; z-index: 2; width: auto; height: auto; box-sizing: border-box; pointer-events: none; } .placar-tv-box { background: transparent; width: 460px; max-width: 92vw; } .status-badge-tv { text-align: right; color: #d8ff63; font-size: 11px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; padding-right: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); } .tabela-tv-placar { width: 100%; border-collapse: separate; border-spacing: 0 6px; } .tabela-tv-placar th { color: #a9c6e6; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 10px 2px 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); } .th-jogador { text-align: left; } .th-set { text-align: center; width: 50px; } .th-pontos { text-align: center; width: 65px; } .linha-jogador-tv td { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1); height: 42px; vertical-align: middle; box-shadow: 0 4px 15px rgba(0,0,0,0.5); } .linha-jogador-tv td:first-child { border-left: 1px solid rgba(15, 23, 42, 0.85); border-top-left-radius: 8px; border-bottom-left-radius: 8px; padding-left: 12px; } .linha-jogador-tv td:last-child { border-right: 1px solid rgba(15, 23, 42, 0.85); border-top-right-radius: 8px; border-bottom-right-radius: 8px; } .nome-tv-atleta { color: #ffffff; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; } .serve-ball-tv { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d8ff63; box-shadow: 0 0 8px #d8ff63; flex-shrink: 0; } .set-tv-score { text-align: center; color: #d8ff63; font-size: 16px; font-weight: 800; } .pontos-tv-score { text-align: center; color: #ffffff; font-size: 16px; font-weight: 800; background: rgba(255, 255, 255, 0.05); border-left: 1px solid rgba(255, 255, 255, 0.1); } .tv-info-box { margin-top: 10px; color: #cbd5e1; font-size: 12px; text-align: right; opacity: 0.9; text-shadow: 0 2px 4px rgba(0,0,0,0.85); } @media (max-width: 768px) { .placar-tv-box { width: 94vw; max-width: 94vw; } .nome-tv-atleta { max-width: 120px; font-size: 11px; } .status-badge-tv { font-size: 10px; } } </style>
</head>
<body>

  <div id="telaInicial">
    <button class="btn-iniciar-tv" id="btnAbrirCamera" type="button">Iniciar Transmissão</button>
    <div class="camera-status" id="cameraStatus">
      Toque em “Iniciar Transmissão” para abrir a câmera traseira.
    </div>
  </div>

  <video id="liveVideo" autoplay playsinline muted loop preload="auto" disablepictureinpicture ></video>

  <main class="tv-overlay-container">
    <div class="placar-tv-box">
      <div class="status-badge-tv" id="tvStatus">AGUARDANDO SINAL...</div>
      <div id="tvGridPlacar"></div>
      <div class="tv-info-box" id="tvInfoBox"></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/aovivo.js?v=4"></script>
</body>
</html>
