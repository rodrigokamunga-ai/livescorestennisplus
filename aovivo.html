<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="theme-color" content="#0f1726" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="description" content="Transmissão ao vivo TennisPro" />

  <title>Ao Vivo - TennisPro</title>

  <link rel="manifest" href="manifest.json" />

  <link rel="icon" href="img/icon-192.png" />

  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <!-- Estilos gerais -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Estilos públicos -->
  <link rel="stylesheet" href="css/public.css" />

  <!-- Estilos exclusivos da transmissão -->
  <link rel="stylesheet" href="css/aovivo.css?v=20260720-01" />
</head>

<body class="aovivo-page">

  <main class="live-page">

    <!-- Barra superior -->
    <section class="topbar">

      <div>
        <div class="status" id="tvStatus" >
          Carregando...
        </div>

        <div class="info" id="tvInfoBox" >
          Inicializando transmissão
        </div>
      </div>

      <div class="actions">

        <!-- Botão do transmissor -->
        <button class="btn green" id="btnAbrirCamera" type="button" >
          <ion-icon name="videocam-outline" ></ion-icon>

          <span>
            Iniciar transmissão
          </span>
        </button>

        <!-- Iniciar gravação -->
        <button class="btn gray" id="btnIniciarGravacao" type="button" >
          <ion-icon name="radio-outline" ></ion-icon>

          <span>
            Gravar vídeo
          </span>
        </button>

        <!-- Parar gravação -->
        <button class="btn recording" id="btnPararGravacao" type="button" >
          <ion-icon name="stop-circle-outline" ></ion-icon>

          <span>
            Parar e salvar
          </span>
        </button>

        <!-- Ativar áudio -->
        <button class="btn gray" id="btnAtivarAudio" type="button" >
          <ion-icon name="play-outline" ></ion-icon>

          <span>
            Iniciar transmissão
          </span>
        </button>

        <!-- Atualizar tela -->
        <button class="btn gray" id="btnAtualizarTela" type="button" >
          <ion-icon name="refresh-outline" ></ion-icon>

          <span>
            Atualizar tela
          </span>
        </button>

        <!-- Tela cheia -->
        <button class="btn gray" id="btnExpandirTela" type="button" >
          <ion-icon name="expand-outline" ></ion-icon>

          <span>
            Expandir tela
          </span>
        </button>

        <!-- Tentar novamente -->
        <button class="btn gray" id="btnTentarNovamente" type="button" >
          <ion-icon name="refresh-outline" ></ion-icon>

          <span>
            Tentar novamente
          </span>
        </button>

      </div>
    </section>

    <!-- Área do vídeo -->
    <section class="video-wrap" id="videoWrap" aria-label="Transmissão ao vivo" >

      <video id="liveVideo" autoplay muted playsinline webkit-playsinline ></video>

      <!-- Tela inicial / carregamento -->
      <div class="overlay" id="telaInicial" >
        Aguardando vídeo...
      </div>

      <!-- Placar -->
      <div class="live-public-scoreboard" id="livePublicScoreboard" aria-live="polite" >
        <div class="live-scoreboard-shell" id="liveScoreboardShell" >
          <div class="live-scoreboard-status" id="liveScoreboardStatus" ></div>

          <div class="live-scoreboard-content" id="tvGridPlacar" ></div>
        </div>
      </div>

      <!-- Mensagem de encerramento -->
      <div class="live-scoreboard-ending" id="liveEndingMessage" >
        Encerrando transmissão
      </div>

    </section>

    <!-- Áreas de debug -->
    <section class="debug" id="cameraStatus" ></section>

    <section class="debug" id="cameraDebug" ></section>

  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <!-- Scripts do projeto -->
  <script src="js/firebase.js"></script>

  <script src="js/tennisRules.js"></script>

  <!-- SDK local do LiveKit -->
  <script src="js/livekit-client.umd.min.js"></script>

  <!-- Usado para incluir o placar na gravação -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- Arquivo principal da transmissão -->
  <script src="js/aovivo.js?v=20260720-02"></script>

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js" ></script>

  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js" ></script>

</body>
</html>
