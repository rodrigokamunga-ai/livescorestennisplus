<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=landscape" />
  <title>Transmissão Placar TV | TennisPro</title>

  <link rel="stylesheet" href="css/aovivo.css" />
</head>
<body class="aovivo-page">

  <div id="telaInicial">
    <button class="btn-iniciar-tv" id="btnAbrirCamera" type="button">
      Iniciar Transmissão
    </button>

    <button class="btn-retry" id="btnTentarNovamente" type="button">
      Tentar novamente
    </button>

    <div class="camera-status" id="cameraStatus">
      Toque em “Iniciar Transmissão” para abrir a câmera traseira.
    </div>

    <div class="camera-hint" id="cameraHint"></div>
    <div class="camera-debug" id="cameraDebug"></div>
  </div>

  <video id="liveVideo" autoplay playsinline muted loop preload="auto" disablepictureinpicture ></video>

  <main class="tv-overlay-container">
    <div class="placar-tv-box">
      <div class="status-badge-tv" id="tvStatus">AGUARDANDO SINAL...</div>
      <div id="tvGridPlacar"></div>
      <div class="tv-info-box" id="tvInfoBox"></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/aovivo.js?v=7"></script>
</body>
</html>
