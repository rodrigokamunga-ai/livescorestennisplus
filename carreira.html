<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1726" />
  <meta name="description" content="Live Scores Tennis Plus - carreira e histórico do atleta" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <title>Carreira | TennisPro</title>

  <link rel="stylesheet" href="css/style.css?v=20260721-6" />
  <link rel="stylesheet" href="css/carreira.css?v=20260721-6" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js" ></script>

  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js" ></script>
</head>

<body class="career-page">

  <!-- NAVBAR FIXA NO TOPO -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top menu-fixed-top" aria-label="Menu principal" >
    <div class="container-xl menu-navbar-top">

      <a href="menu.html" class="menu-back-btn" aria-label="Voltar" >
        <ion-icon name="arrow-undo-outline"></ion-icon>
      </a>

      <a class="navbar-brand fw-bold d-flex align-items-center gap-2 career-navbar-brand">
        <ion-icon name="trophy-outline" style="font-size: 1.2rem;" ></ion-icon>

        <span>Carreira</span>
      </a>

    </div>
  </nav>

  <main class="container stack">

    <section class="panel panel-glass" style="padding: 22px;" >

      <!-- CABEÇALHO -->
      <div class="career-header">
        <div>
          <span class="section-kicker">
            Histórico e Conquistas do atleta
          </span>

          <h1 id="pageTitle">
            Carreira
          </h1>

          <p id="subtitle">
            Histórico de partidas finalizadas do usuário
          </p>
        </div>
      </div>

      <!-- RESUMO DA CARREIRA -->
      <div class="career-summary">

        <!-- LINHA 1 — CARD PRINCIPAL -->
        <div class="career-summary-card total matches" data-filter="all" >
          <ion-icon name="calendar-outline" class="career-card-icon" ></ion-icon>

          <span>Total de partidas</span>
          <strong id="totalMatches">0</strong>
        </div>

        <!-- LINHA 2 -->
        <div class="career-summary-card tournament" data-filter="tournaments" >
          <ion-icon name="trophy-outline" class="career-card-icon" ></ion-icon>

          <span>Torneios disputados</span>
          <strong id="totalTournaments">0</strong>
        </div>

        <div class="career-summary-card win" data-filter="wins" >
          <ion-icon name="checkmark-circle-outline" class="career-card-icon" ></ion-icon>

          <span>Vitórias</span>
          <strong id="totalWins">0</strong>
        </div>

        <div class="career-summary-card loss" data-filter="losses" >
          <ion-icon name="close-circle-outline" class="career-card-icon" ></ion-icon>

          <span>Derrotas</span>
          <strong id="totalLosses">0</strong>
        </div>

        <!-- LINHA 3 -->
        <div class="career-summary-card champion" data-filter="champion" >
          <ion-icon name="ribbon-outline" class="career-card-icon" ></ion-icon>

          <span>Conquistas</span>
          <strong id="totalChampion">0</strong>
        </div>

        <div class="career-summary-card runnerup" data-filter="runnerup" >
          <ion-icon name="medal-outline" class="career-card-icon" ></ion-icon>

          <span>Vice-campeonato</span>
          <strong id="totalRunnerup">0</strong>
        </div>

        <div class="career-summary-card ranking" data-filter="ranking" >
          <ion-icon name="stats-chart-outline" class="career-card-icon" ></ion-icon>

          <span>Ranking</span>
          <strong id="totalRanking">0</strong>
        </div>

        <!-- LINHA 4 -->
        <div class="career-summary-card training" data-filter="training" >
          <ion-icon name="tennisball-outline" class="career-card-icon" ></ion-icon>

          <span>Treinos</span>
          <strong id="totalTraining">0</strong>
        </div>

        <div class="career-summary-card simple" data-filter="simple" >
          <ion-icon name="person-outline" class="career-card-icon" ></ion-icon>

          <span>Simples</span>
          <strong id="totalSimple">0</strong>
        </div>

        <div class="career-summary-card doubles" data-filter="doubles" >
          <ion-icon name="people-outline" class="career-card-icon" ></ion-icon>

          <span>Duplas</span>
          <strong id="totalDoubles">0</strong>
        </div>

      </div>

      <!-- FILTROS -->
      <div id="careerFiltersSection" class="career-filters ionic-filters" >

        <div class="ionic-filter-card">
          <label for="yearFilter">
            <span class="ionic-label">
              Ano da partida
            </span>

            <select id="yearFilter" class="ionic-select" >
              <option value="">
                Todos os anos
              </option>
            </select>
          </label>
        </div>

        <div class="ionic-filter-card">
          <label for="playerName">
            <span class="ionic-label">
              Pesquisar adversário
            </span>

            <input type="text" id="playerName" class="ionic-input" placeholder="Filtrar pelo adversário" autocomplete="off" />
          </label>
        </div>

        <div class="ionic-filter-card">
          <label for="tournamentFilter">
            <span class="ionic-label">
              Torneio
            </span>

            <select id="tournamentFilter" class="ionic-select" >
              <option value="">
                Todos os torneios
              </option>
            </select>
          </label>
        </div>

        <div class="ionic-filter-card">
          <label for="stageFilter">
            <span class="ionic-label">
              Fase do torneio
            </span>

            <select id="stageFilter" class="ionic-select" >
              <option value="">
                Todas
              </option>

              <option value="Primeira Rodada">
                Primeira Rodada
              </option>

              <option value="Segunda Rodada">
                Segunda Rodada
              </option>

              <option value="Terceira Rodada">
                Terceira Rodada
              </option>

              <option value="Oitavas de Final">
                Oitavas de Final
              </option>

              <option value="Quartas de Final">
                Quartas de Final
              </option>

              <option value="Semifinais">
                Semifinais
              </option>

              <option value="Final">
                Final
              </option>

              <option value="Grupos">
                Grupos
              </option>
            </select>
          </label>
        </div>

        <div class="career-filter-actions ionic-actions">

          <button type="button" class="ionic-btn primary career-filter-btn" id="applyFilterBtn" >
            <ion-icon name="search-outline"></ion-icon>
            <span>Filtrar</span>
          </button>

          <button type="button" class="ionic-btn secondary career-filter-btn" id="clearFilterBtn" >
            <ion-icon name="brush-outline"></ion-icon>
            <span>Limpar</span>
          </button>

        </div>

      </div>

      <!-- MENSAGEM -->
      <div id="summaryMessage" class="career-message" ></div>

      <!-- HISTÓRICO -->
      <div id="historyList" class="career-history-list" ></div>

      <!-- PAGINAÇÃO -->
      <div class="career-pagination">

        <button type="button" id="prevPageBtn" class="career-page-btn" >
          <span class="career-page-btn-icon">
            <ion-icon name="chevron-back-outline"></ion-icon>
          </span>

          <span class="career-page-btn-label">
            Anterior
          </span>
        </button>

        <span id="pageInfo" class="career-page-info" >
          Página 1 de 1
        </span>

        <button type="button" id="nextPageBtn" class="career-page-btn" >
          <span class="career-page-btn-label">
            Próximo
          </span>

          <span class="career-page-btn-icon">
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </span>
        </button>

      </div>

    </section>

  </main>

  <!-- MENU INFERIOR -->
  <nav class="career-bottom-nav">

    <a href="menu.html" class="career-bottom-btn" >
      <span class="career-bottom-icon">
        <ion-icon name="home-outline"></ion-icon>
      </span>

      <span class="career-bottom-label">
        Início
      </span>
    </a>

    <button type="button" id="toggleFiltersBtn" class="career-bottom-btn" >
      <span class="career-bottom-icon">
        <ion-icon name="search-outline"></ion-icon>
      </span>

      <span class="career-bottom-label">
        Filtros
      </span>
    </button>

    <a href="dashboard.html" class="career-bottom-btn" >
      <span class="career-bottom-icon">
        <ion-icon name="stats-chart-outline"></ion-icon>
      </span>

      <span class="career-bottom-label">
        Dashboard
      </span>
    </a>

    <a href="admin.html" class="career-bottom-btn" >
      <span class="career-bottom-icon">
        <ion-icon name="tennisball-outline"></ion-icon>
      </span>

      <span class="career-bottom-label">
        Partida
      </span>
    </a>

    <a href="relatorio.html" class="career-bottom-btn" >
      <span class="career-bottom-icon">
        <ion-icon name="document-text-outline"></ion-icon>
      </span>

      <span class="career-bottom-label">
        Relatórios
      </span>
    </a>

  </nav>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/carreira.js?v=20260721-6"></script>

  <!-- Service Worker -->
  <script> if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker .register("./service-worker.js") .then((registration) => { console.log( "Service Worker registrado:", registration ); }) .catch((error) => { console.error( "Erro ao registrar Service Worker:", error ); }); }); } </script>

</body>
</html>
