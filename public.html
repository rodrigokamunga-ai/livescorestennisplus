<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1726" />
  <meta name="description" content="Live Scores Tennis Plus - tela pública de partidas" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <title>Tela Pública - TennisPro</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/public.css" />

  
</head>

<body class="public-page public-dashboard-page">
  <main class="container dashboard-container">

    <div class="mobile-filters">
      <label for="liveStatusFilter" class="filter-label mobile-filters-label">
        Filtrar partidas
      </label>

      <select id="liveStatusFilter" class="filter-select">
        <option value="all">Todos</option>
        <option value="scheduled">Jogos do dia</option>
        <option value="live">Jogos em andamento</option>
        <option value="finished">Jogos finalizados</option>
      </select>
    </div>

    <!-- Botão invisível utilizado pelo public.js. Os botões visíveis são criados abaixo da probabilidade de vitória. -->
    <button id="statsBtn" type="button" hidden aria-hidden="true" tabindex="-1">
      Stats
    </button>

    <section class="public-grid board-grid dashboard-grid" id="gamesGrid">

      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <ion-icon name="calendar-outline" class="section-icon">
            </ion-icon>

            <h3>Jogos do dia</h3>
          </div>

          <span class="badge" id="countScheduled">0</span>
        </div>

        <div id="scheduledList" class="cards compact-cards column-scroll dashboard-list">
        </div>
      </div>

      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <ion-icon name="flash-outline" class="section-icon live">
            </ion-icon>

            <h3>Em andamento</h3>
          </div>

          <span class="badge" id="countLive">0</span>
        </div>

        <div id="liveList" class="cards compact-cards column-scroll dashboard-list">
        </div>
      </div>

      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <ion-icon name="flag-outline" class="section-icon finished">
            </ion-icon>

            <h3>Finalizados</h3>
          </div>

          <span class="badge" id="countFinished">0</span>
        </div>

        <div id="finishedList" class="cards compact-cards column-scroll dashboard-list">
        </div>
      </div>

    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/public.js?v=10"></script>

  <script> document.addEventListener("DOMContentLoaded", () => { async function getCurrentUserLiveMatch() { try { if (!window.__auth || !window.__db) { return null; } const user = window.__auth.currentUser; if (!user) { return null; } const snap = await window.__db .collection("matches") .where("ownerId", "==", user.uid) .where("status", "==", "live") .limit(1) .get(); if (snap.empty) { return null; } const doc = snap.docs[0]; return { id: doc.id, data: doc.data() }; } catch (error) { console.error( "Erro ao buscar partida ao vivo:", error ); return null; } } async function buildViewerUrl() { const match = await getCurrentUserLiveMatch(); if (!match) { return null; } const url = new URL( "aovivo.html", window.location.href ); url.searchParams.set("id", match.id); url.searchParams.set("role", "viewer"); const shareToken = String( match.data?.shareToken || "" ).trim(); if (shareToken) { url.searchParams.set( "shareToken", shareToken ); } return url.toString(); } async function buildBroadcasterUrl() { const match = await getCurrentUserLiveMatch(); if (!match) { return null; } const url = new URL( "aovivo.html", window.location.href ); url.searchParams.set("id", match.id); url.searchParams.set("role", "broadcaster"); const shareToken = String( match.data?.shareToken || "" ).trim(); if (shareToken) { url.searchParams.set( "shareToken", shareToken ); } return url.toString(); } async function shareLiveMatch() { try { const shareUrl = await buildViewerUrl(); if (!shareUrl) { alert( "Nenhuma partida ao vivo encontrada para este usuário." ); return; } if (navigator.share) { await navigator.share({ title: "Partida ao vivo - TennisPro", text: "Acesse a transmissão ao vivo da partida.", url: shareUrl }); return; } if (navigator.clipboard?.writeText) { await navigator.clipboard.writeText( shareUrl ); alert("Link copiado!"); return; } prompt( "Copie o link da transmissão:", shareUrl ); } catch (error) { console.error(error); alert( "Não foi possível compartilhar a partida." ); } } async function openBroadcaster() { try { const url = await buildBroadcasterUrl(); if (!url) { alert( "Nenhuma partida ao vivo encontrada para este usuário." ); return; } window.open(url, "_blank"); } catch (error) { console.error(error); alert( "Não foi possível abrir o transmissor." ); } } async function openH2H() { try { const match = await getCurrentUserLiveMatch(); if (!match) { alert( "Nenhuma partida ao vivo encontrada para este usuário." ); return; } const data = match.data || {}; const opponentName = String( data.player2 || data.player2Name || data.opponent || data.opponentName || data.away || data.awayName || data.player3 || data.player3Name || data.player4 || data.player4Name || "" ).trim(); const opponentId = String( data.opponentId || data.player2Id || data.playerId2 || data.awayId || data.player3Id || data.player4Id || "" ).trim(); if (!opponentName && !opponentId) { alert( "Não foi possível identificar o adversário da partida." ); return; } const url = new URL( "confronto.html", window.location.href ); if (opponentName) { url.searchParams.set( "player2", opponentName ); } if (opponentId) { url.searchParams.set( "opponentId", opponentId ); } window.open(url.toString(), "_blank"); } catch (error) { console.error(error); alert( "Não foi possível abrir o confronto." ); } } function openStats() { const statsButton = document.getElementById("statsBtn"); if (statsButton) { statsButton.click(); } } function createActionButtons() { const probabilityBlocks = document.querySelectorAll( ".win-probability-chart" ); probabilityBlocks.forEach((probabilityBlock) => { if ( probabilityBlock.nextElementSibling?.classList.contains( "public-actions-section" ) ) { return; } const actionsSection = document.createElement("section"); actionsSection.className = "public-actions-section"; actionsSection.innerHTML = ` <div class="public-actions-row" aria-label="Ações da partida"> <button type="button" class="action-btn public-action-btn" data-action="live"> <ion-icon name="share-social-outline"></ion-icon> <span>Live</span> </button> <button type="button" class="action-btn public-action-btn" data-action="stats"> <ion-icon name="stats-chart-outline"></ion-icon> <span>Stats</span> </button> <button type="button" class="action-btn public-action-btn" data-action="h2h"> <ion-icon name="people-outline"></ion-icon> <span>H2H</span> </button> <button type="button" class="action-btn public-action-btn" data-action="broadcast"> <ion-icon name="videocam-outline"></ion-icon> <span>Transmitir</span> </button> </div> `; probabilityBlock.insertAdjacentElement( "afterend", actionsSection ); }); } document.addEventListener("click", (event) => { const actionButton = event.target.closest( ".public-action-btn" ); if (!actionButton) { return; } event.preventDefault(); event.stopPropagation(); const action = actionButton.dataset.action || ""; if (action === "live") { shareLiveMatch(); return; } if (action === "stats") { openStats(); return; } if (action === "h2h") { openH2H(); return; } if (action === "broadcast") { openBroadcaster(); } }); const observer = new MutationObserver(() => { createActionButtons(); }); const liveList = document.getElementById("liveList"); if (liveList) { observer.observe(liveList, { childList: true, subtree: true }); } createActionButtons(); }); </script>

  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js">
  </script>

  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js">
  </script>

  <script> if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker .register("./service-worker.js") .then((registration) => { console.log( "Service Worker registrado:", registration ); }) .catch((error) => { console.error( "Erro ao registrar Service Worker:", error ); }); }); } </script>
</body>
</html>
