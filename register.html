<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1726" />
  <meta name="description" content="Live Scores Tennis Plus - criação de cadastro" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <title>Criar cadastro | TennisPro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">

      <div class="brand-wrap auth-brand">
        <div class="app-logo">
          <img src="img/logo.png" alt="Live Scores Tennis +" class="app-logo-img" />
        </div>
        <div>
          <h1>Criar cadastro</h1>
          <p class="muted">Crie sua conta para acessar o sistema</p>
        </div>
      </div>

      <!-- ── Cadastro com Google ─────────────────────────────── -->
      <button type="button" id="googleRegisterBtn" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Cadastrar com Google
      </button>

      <div class="auth-divider">ou cadastre com e-mail</div>

      <!-- ── Formulário e-mail/senha ────────────────────────── -->
      <form id="registerForm" class="form auth-form" novalidate>

        <label>Nome do Usuário
          <input type="text" id="displayName" required placeholder="Nome do jogador que será exibido" />
        </label>

        <label>E-mail
          <input type="email" id="email" required placeholder="Informe o e-mail" autocomplete="email" />
        </label>

        <label>Senha
          <div class="password-wrapper">
            <input type="password" id="password" required minlength="8" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="password" aria-label="Mostrar/ocultar senha">👁️</button>
          </div>
          <!-- Barra de força -->
          <div class="password-strength-bar" id="strengthBar"></div>
          <div class="password-strength-label" id="strengthLabel"></div>
        </label>

        <label>Confirmar senha
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" required minlength="8" placeholder="Repita a senha" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="confirmPassword" aria-label="Mostrar/ocultar confirmação">👁️</button>
          </div>
        </label>

        <button type="submit" class="btn primary">Cadastrar</button>

        <!-- ── Biometria (WebAuthn — aparece após cadastro) ── -->
        <button type="button" id="biometricRegisterBtn" class="btn-biometric" style="display:none;">
          🔐 Registrar biometria para login rápido
        </button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Já tenho conta</a>
        </div>
      </form>

      <div id="registerMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/register.js"></script>

  <script> if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js") .then((registration) => { console.log("Service Worker registrado:", registration); }) .catch((error) => { console.error("Erro ao registrar Service Worker:", error); }); }); } </script>
</body>
</html>
