<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criar cadastro | Live Scores Tennis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="brand-wrap auth-brand">
        <div class="app-logo">
          <img src="img/logo.png" alt="Live Scores Tennis +" class="app-logo-img" />
        </div>
        <div>
          <h1>Criar cadastro</h1>
          <p class="muted">Crie sua conta para acessar o sistema</p>
        </div>
      </div>

      <form id="registerForm" class="form auth-form">
        <label>Nome
          <input type="text" id="displayName" required placeholder="Informe o nome do jogador que será exibido" />
        </label>

        <label>E-mail
          <input type="email" id="email" required placeholder="Informe o e-mail" />
        </label>

        <label>Senha
          <input type="password" id="password" required minlength="6" placeholder="Informe a senha" />
        </label>

        <label>Confirmar senha
          <input type="password" id="confirmPassword" required minlength="6" placeholder="Confirme sua senha" />
        </label>

        <button type="submit" class="btn primary">Cadastrar</button>

        <div class="auth-links">
          <a href="login.html" class="auth-link">Já tenho conta</a>
        </div>
      </form>

      <div id="registerMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
