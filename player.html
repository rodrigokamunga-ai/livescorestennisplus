<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jogador | Live Scores Tennis</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="player-page">
  <main class="container stack">
    <section class="player-hero panel panel-glass">

      <!-- Cabeçalho -->
      <div class="player-hero-top">
        <div class="brand-wrap">
          <div>
            <span class="section-kicker">Controle da Partida</span>
            <h2 id="matchTitle">Partida</h2>
            <div class="match-meta-top">
              <div class="meta-line">Data e hora: <strong id="matchDateTimeTop">-</strong></div>
              <p id="matchSubTitle" class="muted">Acompanhe e atualize o placar em tempo real</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Timer + Status -->
      <div class="player-timer-bar">
        <div class="timer-line">
          <span>Duração</span>
          <strong id="duration">00:00:00</strong>
        </div>
        <div class="timer-line">
          <span>Situação</span>
          <strong id="statusLabel">Não Iniciada</strong>
        </div>
      </div>

      <!-- Toggle Games / Pontos -->
      <div class="input-mode-toggle" id="inputModeToggle">
        <label id="modeGamesLabel" class="active" for="modeGames">
          <input type="radio" name="inputMode" id="modeGames" value="games" checked />
          <span>🎮 Games</span>
        </label>
        <label id="modePointsLabel" for="modePoints">
          <input type="radio" name="inputMode" id="modePoints" value="points" />
          <span>🎯 Pontos</span>
        </label>
      </div>

      <!-- Placar: um jogador por linha -->
      <div class="score-unified" id="playerPanelBody">

        <!-- ── Jogador 1 ── -->
        <div class="player-col">

          <!-- Nome + Saque na mesma linha -->
          <label class="player-col-name-row" for="servePlayer1" id="serveOption1">
            <input type="radio" name="server" value="player1" id="servePlayer1" />
            <span class="serve-ball-indicator" title="Sacador"></span>
            <span class="player-col-name" id="player1Name">Jogador 1</span>
          </label>

          <!-- Pontos (modo Pontos) -->
          <div class="point-control" id="pointControl1">
            <button class="point-btn" data-delta="-1" data-target="player1">−</button>
            <strong class="point-value" id="points1">0</strong>
            <button class="point-btn" data-delta="1" data-target="player1">+</button>
          </div>

          <!-- Games +/– (modo Games) -->
          <div class="games-control" id="gamesControl1">
            <div class="games-control-btns">
              <button class="games-mini-btn" data-games-delta="-1" data-games-target="player1">−</button>
              <span class="games-mini-val" id="gamesVal1">0</span>
              <button class="games-mini-btn" data-games-delta="1" data-games-target="player1">+</button>
            </div>
          </div>

          <!-- Games / Sets display -->
          <div class="score-row">
            <div class="score-box">
              <span>Games</span>
              <strong id="games1">0</strong>
            </div>
            <div class="score-box">
              <span>Sets</span>
              <strong id="sets1">0</strong>
            </div>
          </div>

        </div>

        <!-- ── Jogador 2 ── -->
        <div class="player-col">

          <!-- Nome + Saque na mesma linha -->
          <label class="player-col-name-row" for="servePlayer2" id="serveOption2">
            <input type="radio" name="server" value="player2" id="servePlayer2" />
            <span class="serve-ball-indicator" title="Sacador"></span>
            <span class="player-col-name" id="player2Name">Jogador 2</span>
          </label>

          <!-- Pontos (modo Pontos) -->
          <div class="point-control" id="pointControl2">
            <button class="point-btn" data-delta="-1" data-target="player2">−</button>
            <strong class="point-value" id="points2">0</strong>
            <button class="point-btn" data-delta="1" data-target="player2">+</button>
          </div>

          <!-- Games +/– (modo Games) -->
          <div class="games-control" id="gamesControl2">
            <div class="games-control-btns">
              <button class="games-mini-btn" data-games-delta="-1" data-games-target="player2">−</button>
              <span class="games-mini-val" id="gamesVal2">0</span>
              <button class="games-mini-btn" data-games-delta="1" data-games-target="player2">+</button>
            </div>
          </div>

          <!-- Games / Sets display -->
          <div class="score-row">
            <div class="score-box">
              <span>Games</span>
              <strong id="games2">0</strong>
            </div>
            <div class="score-box">
              <span>Sets</span>
              <strong id="sets2">0</strong>
            </div>
          </div>

        </div>

      </div><!-- /score-unified -->

      <!-- Campos ocultos para compatibilidade -->
      <input type="hidden" id="editGames1" />
      <input type="hidden" id="editGames2" />
      <span style="display:none" id="games1Label"></span>
      <span style="display:none" id="games2Label"></span>
      <!-- Labels legados para compatibilidade com player.js -->
      <span style="display:none" id="servePlayer1Label">Jogador 1</span>
      <span style="display:none" id="servePlayer2Label">Jogador 2</span>

      <div id="playerMsg" class="msg"></div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav class="player-bottom-nav">
    <a href="admin.html" class="player-bottom-btn">
      <span class="player-bottom-icon">🎾</span>
      <span class="player-bottom-label">Partida</span>
    </a>
    <button id="startBtn" class="player-bottom-btn primary-action" type="button">
      <span class="player-bottom-icon" id="startBtnIcon">▶️</span>
      <span class="player-bottom-label" id="startBtnLabel">Iniciar</span>
    </button>
    <button id="finishBtn" class="player-bottom-btn danger" type="button">
      <span class="player-bottom-icon">🏁</span>
      <span class="player-bottom-label">Finalizar</span>
    </button>
    <button id="resetScoreBtn" class="player-bottom-btn danger" type="button">
      <span class="player-bottom-icon">🧹</span>
      <span class="player-bottom-label">Zerar</span>
    </button>
    <button id="undoBtn" class="player-bottom-btn" type="button">
      <span class="player-bottom-icon">↩️</span>
      <span class="player-bottom-label">Desfazer</span>
    </button>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/tennisRules.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
