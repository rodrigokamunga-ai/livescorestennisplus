<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jogador | Live Scores Tennis +</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="player-page">
  <header class="topbar">
    <div>
      <h1>Live Scores Tennis +</h1>
      <p id="matchHeader">Carregando partida...</p>
    </div>
    <nav class="topnav">
      <a href="index.html">Visualização</a>
    </nav>
  </header>

  <main class="container stack">
    <section class="player-hero panel">
      <div class="player-hero-top">
        <div>
          <span class="section-kicker">Painel do Jogador</span>
          <h2 id="matchTitle">Partida</h2>
          <p id="matchSubTitle" class="muted">Acompanhe e atualize o placar em tempo real</p>
        </div>
        <div class="player-status" id="playerStatus">NÃO INICIADA</div>
      </div>

      <div class="player-info-grid" id="matchInfo"></div>

      <div class="player-timer-bar">
        <div><span>Duração</span><strong id="duration">00:00:00</strong></div>
        <div><span>Status</span><strong id="statusLabel">NÃO INICIADA</strong></div>
      </div>

      <div class="actions player-actions">
        <button id="startBtn" class="btn primary">Iniciar partida</button>
        <button id="finishBtn" class="btn danger">Finalizar partida</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Placar</h2>
          <p class="muted">Controle de pontos e edição manual</p>
        </div>
      </div>

      <div class="score-grid">
        <div class="score-card player-card">
          <div class="player-badge">JOGADOR 1</div>
          <h3 id="player1Name">Jogador 1</h3>
          <div class="score-value" id="score1">0</div>
          <div class="score-controls">
            <button class="btn" data-delta="1" data-target="player1">+</button>
            <button class="btn" data-delta="-1" data-target="player1">-</button>
            <input type="number" min="0" id="editScore1" />
            <button class="btn" data-save="player1">Salvar</button>
          </div>
        </div>

        <div class="score-card player-card">
          <div class="player-badge">JOGADOR 2</div>
          <h3 id="player2Name">Jogador 2</h3>
          <div class="score-value" id="score2">0</div>
          <div class="score-controls">
            <button class="btn" data-delta="1" data-target="player2">+</button>
            <button class="btn" data-delta="-1" data-target="player2">-</button>
            <input type="number" min="0" id="editScore2" />
            <button class="btn" data-save="player2">Salvar</button>
          </div>
        </div>
      </div>

      <div id="playerMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
