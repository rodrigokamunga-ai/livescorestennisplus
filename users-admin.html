<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1726" />
  <meta name="description" content="Live Scores Tennis Plus - administração de usuários" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="img/icon-192.png" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />

  <title>Usuários | TennisPro</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/users-admin.css" />
</head>

<body class="admin-page">
  <main class="container stack">
    <section class="panel panel-glass admin-panel">

      <div class="section-head">
        <div>
          <span class="section-kicker">Administração</span>
          <h2>Cadastros do sistema</h2>
          <p class="muted">Bloqueie, desbloqueie ou exclua usuários cadastrados</p>
        </div>

        <nav class="topnav">
          <a href="menu.html" class="btn link admin-back-btn">← Voltar ao menu</a>
        </nav>
      </div>

      <div class="filters-bar">
        <input type="text" id="filterName" placeholder="Pesquisar por nome" />
        <input type="text" id="filterEmail" placeholder="Pesquisar por e-mail" />
        <select id="filterStatus">
          <option value="">Todos os status</option>
          <option value="active">Ativo</option>
          <option value="blocked">Bloqueado</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="table-wrap desktop-table">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Status</th>
              <th>Opções</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>

      <div id="paginationBar"></div>
      <div id="adminMsg" class="msg"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/users-admin.js"></script>

  <script> if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js") .then((registration) => { console.log("Service Worker registrado:", registration); }) .catch((error) => { console.error("Erro ao registrar Service Worker:", error); }); }); } </script>
</body>
</html>
