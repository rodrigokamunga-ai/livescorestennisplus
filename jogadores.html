<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jogadores | Live Scores Tennis</title>
  <link rel="stylesheet" href="css/style.css" />

  <style> body.players-page { background: radial-gradient(circle at top, rgba(72, 96, 136, 0.22), transparent 26%), radial-gradient(circle at 50% 0%, rgba(216, 255, 99, 0.10), transparent 18%), linear-gradient(180deg, #0f1726 0%, #08101d 100%); color: #e8eefc; padding-bottom: 92px; } .players-page .players-hero { padding: 22px; border-radius: 30px; background: radial-gradient(circle at top right, rgba(216,255,99,0.10), transparent 24%), linear-gradient(180deg, rgba(24, 32, 50, 0.96), rgba(12, 18, 30, 0.98)); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255,255,255,0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); } .players-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; } .players-title-block h1 { margin-top: 2px; font-size: 1.65rem; font-weight: 950; color: #f4f8ff; letter-spacing: -0.03em; } .players-title-block p { margin-top: 6px; color: rgba(232, 238, 252, 0.72); font-size: 0.96rem; line-height: 1.35; } .players-filter-box { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; justify-content: flex-end; } .players-filter-box label { display: flex; flex-direction: column; gap: 6px; font-size: 0.88rem; font-weight: 700; color: rgba(232, 238, 252, 0.86); min-width: 260px; } .players-filter-box input { width: 100%; padding: 12px 12px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(8, 14, 24, 0.72); color: #f4f8ff; outline: none; } .players-filter-box input:focus { border-color: rgba(110, 165, 255, 0.55); box-shadow: 0 0 0 3px rgba(110, 165, 255, 0.15); } .players-message { margin: 14px 0 18px; color: rgba(232, 238, 252, 0.82); font-size: 0.95rem; } /* ARENA SCOREBOARD */ .players-head-to-head { display: grid; grid-template-columns: minmax(0, 1fr) 220px minmax(0, 1fr); gap: 18px; align-items: stretch; margin-top: 10px; } .players-side { min-width: 0; } .score-card { position: relative; overflow: hidden; border-radius: 34px; padding: 20px; min-height: 260px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at top right, rgba(216,255,99,0.16), transparent 30%), radial-gradient(circle at bottom left, rgba(96,165,250,0.14), transparent 28%), linear-gradient(180deg, rgba(34, 45, 66, 0.98), rgba(12, 18, 30, 0.98)); border: 1px solid rgba(255, 255, 255, 0.10); box-shadow: 0 22px 56px rgba(0, 0, 0, 0.42), 0 0 0 1px rgba(255,255,255,0.03) inset; } .score-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 42%), linear-gradient(90deg, rgba(255,255,255,0.03), transparent 20%, transparent 80%, rgba(255,255,255,0.03)); pointer-events: none; } .score-card.left { border-left: 4px solid #60a5fa; } .score-card.right { border-left: 4px solid #d8ff63; } .score-name { font-size: clamp(1.45rem, 3vw, 2.25rem); font-weight: 950; line-height: 1.04; color: #fff; letter-spacing: -0.03em; word-break: break-word; text-shadow: 0 8px 20px rgba(0,0,0,0.24); } .score-number { font-size: clamp(5rem, 10vw, 7rem); line-height: 0.88; font-weight: 950; letter-spacing: -0.06em; color: #f4f8ff; text-shadow: 0 0 24px rgba(216,255,99,0.10), 0 12px 28px rgba(0, 0, 0, 0.34); } .vs-card { border-radius: 36px; background: radial-gradient(circle at center, rgba(216,255,99,0.24), transparent 42%), radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 58%), linear-gradient(180deg, rgba(10, 16, 28, 0.98), rgba(7, 12, 20, 0.98)); border: 1px solid rgba(216, 255, 99, 0.22); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; box-shadow: 0 22px 48px rgba(0, 0, 0, 0.44), inset 0 1px 0 rgba(255,255,255,0.04); position: relative; overflow: hidden; text-align: center; } .vs-card::before, .vs-card::after { content: ""; position: absolute; width: 180px; height: 2px; background: linear-gradient(90deg, transparent, rgba(216,255,99,0.55), transparent); left: 50%; transform: translateX(-50%); } .vs-card::before { top: 34px; } .vs-card::after { bottom: 34px; } .vs-card .vs-text { font-size: clamp(2.6rem, 5vw, 3.8rem); font-weight: 950; color: #d8ff63; text-transform: uppercase; letter-spacing: 0.18em; text-shadow: 0 0 18px rgba(216,255,99,0.18), 0 12px 28px rgba(0,0,0,0.28); line-height: 1; } .vs-card .vs-subtext { margin-top: 8px; font-size: 0.78rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.16em; color: rgba(232, 238, 252, 0.62); } @media (max-width: 980px) { .players-head-to-head { grid-template-columns: 1fr; } .vs-card { min-height: 92px; } .vs-card::before, .vs-card::after { width: 100px; } } @media (max-width: 768px) { .players-page .players-hero { padding: 16px; border-radius: 24px; } .players-header { flex-direction: column; } .players-filter-box { width: 100%; justify-content: stretch; } .players-filter-box label { min-width: 0; width: 100%; } .players-filter-box .btn { width: 100%; } .score-card { min-height: 210px; padding: 16px; } .score-number { font-size: 4.8rem; } } @media (max-width: 430px) { .score-card { min-height: 196px; padding: 14px; border-radius: 26px; } .score-name { font-size: 1.32rem; } .score-number { font-size: 4.2rem; } .vs-card { min-height: 88px; } .vs-card .vs-text { font-size: 2.1rem; } .vs-card .vs-subtext { font-size: 0.68rem; } } </style>
</head>

<body class="players-page">
  <main class="container stack">

    <section class="players-hero panel panel-glass">
      <div class="players-header">
        <div class="players-title-block">
          <span class="section-kicker">Head to head</span>
          <h1 id="pageTitle">Jogadores</h1>
          <p id="subtitle">Comparativo entre os adversários</p>
        </div>

        <div class="players-filter-box">
          <label>
            Jogador adversário
            <input type="text" id="opponentFilter" placeholder="Pesquisar adversário" />
          </label>

          <button type="button" class="btn primary" id="applyFilterBtn">
            🔎 Filtrar
          </button>

          <button type="button" class="btn" id="clearFilterBtn">
            ✖ Limpar
          </button>
        </div>
      </div>

      <div id="summaryMessage" class="players-message"></div>

      <div class="players-head-to-head">
        <div class="players-side">
          <div class="score-card left">
            <div class="score-name" id="opponentName">Jogador 1</div>
            <div class="score-number" id="opponentWins">0</div>
          </div>
        </div>

        <div class="vs-card">
          <div class="vs-text">VS</div>
          <div class="vs-subtext">wins</div>
        </div>

        <div class="players-side">
          <div class="score-card right">
            <div class="score-name" id="currentUserName">Jogador 2</div>
            <div class="score-number" id="currentUserWins">0</div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <nav class="career-bottom-nav">
    <a href="menu.html" class="career-bottom-btn">
      <span class="career-bottom-icon">🏠</span>
      <span class="career-bottom-label">Início</span>
    </a>

    <a href="perfil.html" class="career-bottom-btn">
      <span class="career-bottom-icon">👤</span>
      <span class="career-bottom-label">Perfil</span>
    </a>

    <a href="index.html" class="career-bottom-btn" target="_blank" rel="noopener noreferrer">
      <span class="career-bottom-icon">🏟️</span>
      <span class="career-bottom-label">Visualização</span>
    </a>

    <a href="admin.html" class="career-bottom-btn">
      <span class="career-bottom-icon">🎾</span>
      <span class="career-bottom-label">Partida</span>
    </a>

    <a href="carreira.html" class="career-bottom-btn">
      <span class="career-bottom-icon">📈</span>
      <span class="career-bottom-label">Carreira</span>
    </a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/jogadores.js"></script>
</body>
</html>
