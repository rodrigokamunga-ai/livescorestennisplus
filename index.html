<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Scores Tennis +</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="public-page public-dashboard-page">
  <header class="topbar topbar-glass dashboard-topbar">
    <div class="brand-wrap dashboard-brand">
      <div class="brand-icon">🎾</div>
      <div>
        <h1>Live Scores Tennis +</h1>
        <p>Placar ao vivo</p>
      </div>
    </div>
  </header>

  <main class="container dashboard-container">
    <section class="public-grid board-grid dashboard-grid" id="gamesGrid">
      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <span class="section-icon">🗓️</span>
            <h3>Jogos do dia</h3>
          </div>
          <span class="badge" id="countScheduled">0</span>
        </div>
        <div id="scheduledList" class="cards compact-cards column-scroll dashboard-list"></div>
      </div>

      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <span class="section-icon live">⚡</span>
            <h3>Em andamento</h3>
          </div>
          <span class="badge" id="countLive">0</span>
        </div>
        <div id="liveList" class="cards compact-cards column-scroll dashboard-list"></div>
      </div>

      <div class="panel panel-glass column-panel dashboard-column">
        <div class="dashboard-title">
          <div class="title-with-icon">
            <span class="section-icon finished">🏁</span>
            <h3>Finalizados</h3>
          </div>
          <span class="badge" id="countFinished">0</span>
        </div>
        <div id="finishedList" class="cards compact-cards column-scroll dashboard-list"></div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
